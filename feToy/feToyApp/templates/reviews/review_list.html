{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>과목별 수강 후기</title>
  <link rel="stylesheet" href="{% static 'css/review-list.css' %}">
</head>
<body>

<div class="mobile-container review-list-page">

  <div id="iconPaths"
    data-like="{% static 'images/좋아요(과목별 수강 후기).svg' %}"
    data-comment="{% static 'images/댓글(과목별 수강 후기).svg' %}"
    data-write="{% static 'images/글쓰기 버튼.svg' %}"
    data-empty="{% static 'images/예외 화면 아이콘.svg' %}"
    data-star-dropdown="{% static 'images/별(전체 드롭다운).svg' %}"
    data-star-active="{% static 'images/활성화 별(과목별 수강 후기-개인별점).svg' %}"
    data-star-inactive="{% static 'images/비활성화 별(과목별 수강 후기-개인 별점).svg' %}">
  </div>

  <header class="review-list-header">
    <button type="button" class="back-btn" onclick="history.back()">
      <img src="{% static 'images/뒤로가기.svg' %}" alt="">
    </button>
    <h1 id="pageTitle">생명과학의기초 수강 후기</h1>
  </header>

  <section class="review-summary">
    <div class="summary-left-wrap">
      <div class="summary-left">
        <strong>4.00</strong>
        <div class="summary-stars" id="summaryStars"></div>
      </div>
      <p class="professor-name" id="professorName">교수명: 김태훈</p>
    </div>

    <div class="filter-box">
      <div class="custom-select" id="ratingFilter">
        <button type="button" class="select-btn">
          <span id="ratingFilterText">전체</span>
          <span class="arrow">
            <img src="{% static 'images/더보기(드롭다운).svg' %}" alt="">
          </span>
        </button>

        <ul class="select-dropdown rating-dropdown">
          <li data-value="전체">전체(265)</li>
          <li data-value="5"><img class="dropdown-star" src="{% static 'images/별(전체 드롭다운).svg' %}" alt=""> 5(160)</li>
          <li data-value="4"><img class="dropdown-star" src="{% static 'images/별(전체 드롭다운).svg' %}" alt=""> 4(69)</li>
          <li data-value="3"><img class="dropdown-star" src="{% static 'images/별(전체 드롭다운).svg' %}" alt=""> 3(23)</li>
          <li data-value="2"><img class="dropdown-star" src="{% static 'images/별(전체 드롭다운).svg' %}" alt=""> 2(7)</li>
          <li data-value="1"><img class="dropdown-star" src="{% static 'images/별(전체 드롭다운).svg' %}" alt=""> 1(6)</li>
        </ul>
      </div>

      <div class="custom-select" id="sortFilter">
        <button type="button" class="select-btn">
          <span id="sortFilterText">최신순</span>
          <span class="arrow">
            <img src="{% static 'images/더보기(드롭다운).svg' %}" alt="">
          </span>
        </button>

        <ul class="select-dropdown sort-dropdown">
          <li data-value="최신순">최신순</li>
          <li data-value="추천순">추천순</li>
          <li data-value="오래된순">오래된순</li>
        </ul>
      </div>
    </div>
  </section>

  <section class="review-list" id="reviewList"></section>

  <button type="button" class="write-btn" id="writeBtn">
    <img src="{% static 'images/글쓰기 버튼.svg' %}" alt="">
    <span>후기 작성</span>
  </button>

  <div class="delete-modal" id="deleteModal">
    <div class="delete-modal-content">
      <p id="deleteModalText">수강 후기를 정말 삭제하시겠습니까?</p>

      <div class="delete-btn-row" id="deleteBtnRow">
        <button type="button" class="cancel-btn" id="cancelDeleteBtn">취소</button>
        <button type="button" class="confirm-delete-btn" id="confirmDeleteBtn">삭제</button>
      </div>

      <button type="button" class="ok-btn" id="deleteOkBtn">확인</button>
    </div>
  </div>

</div>

<script src="{% static 'js/review-list.js' %}"></script>
</body>
</html>
