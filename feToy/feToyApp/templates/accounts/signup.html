{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="{% static 'css/accounts.css' %}">
</head>
<body>

  <div class="mobile-container">

    <section class="signup-box">
      <h1>회원가입</h1>

      <div class="input-group">
        <label for="studentId">학번</label>

        <input
          type="text"
          id="studentId"
          placeholder="학번을 입력하세요."
        >

        <p class="error-text" id="studentIdError">
          8자리 숫자로 입력해 주세요
        </p>

        <p class="help-text">
          *덕성여대 8자리 숫자를 기준으로 작성해주세요
        </p>
      </div>

      <div class="input-group password-group">
        <label for="password">비밀번호</label>

        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력하세요."
          >

          <button type="button" class="eye-btn" id="togglePassword">
            <img src="{% static 'images/비밀번호.svg' %}" alt="비밀번호 보기">
          </button>
        </div>

        <p class="error-text" id="passwordError">
          소문자, 숫자조합을 이용하여 8~10자리로 작성해 주세요
        </p>

        <p class="help-text">
          *소문자, 숫자조합을 이용하여 8~10자리로 작성해 주세요
        </p>
      </div>

      <button type="button" class="signup-btn" id="signupBtn">
        회원가입
      </button>
    </section>

  </div>

  <script src="{% static 'js/accounts.js' %}"></script>
</body>
</html>
